<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Our Story</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; overflow-x: hidden; }

        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 192, 203, 0.25); backdrop-filter: saturate(140%); z-index: 0; }

        /* iPhone Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .fade-in { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* สไตล์ช่อง Redeem */
        .redeem-input {
            background: rgba(255, 255, 255, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            border-radius: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .btn-redeem {
            background: #ff7597;
            border: none;
            border-radius: 15px;
            color: white;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="Video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="container mx-auto px-6 pt-10 relative z-10 max-w-md">
        
        <div class="flex flex-col items-center mb-8 fade-in" style="animation-delay: 0.2s;">
            <div class="avatar online">
                <div class="w-20 rounded-full ring ring-pink-300 ring-offset-2 shadow-lg">
                    <img src="https://i.pinimg.com/564x/5d/7c/f1/5d7cf177d54406a4d70b4352227d825c.jpg" />
                </div>
            </div>
            <h1 class="text-2xl font-bold text-white mt-3 drop-shadow-md">PP ❤️ Put</h1>
        </div>

        <div class="glass-panel p-6 mb-6 text-center fade-in" style="animation-delay: 0.4s;">
            <p class="text-pink-600 text-sm font-semibold mb-3">Together Since Forever</p>
            <div class="flex justify-center gap-4 text-gray-800">
                <div><span id="days" class="text-4xl font-bold">0</span><p class="text-[10px] opacity-60">DAYS</p></div>
                <div><span id="hours" class="text-4xl font-bold">0</span><p class="text-[10px] opacity-60">HRS</p></div>
                <div><span id="mins" class="text-4xl font-bold">0</span><p class="text-[10px] opacity-60">MINS</p></div>
            </div>
        </div>

        <div class="glass-panel p-5 mb-6 fade-in" style="animation-delay: 0.6s;">
            <div class="flex flex-col gap-3">
                <p class="text-center text-xs text-gray-700 font-medium">✨ ใส่รหัสลับเพื่อรับของขวัญ ✨</p>
                <div class="flex gap-2">
                    <input type="text" id="secretCode" placeholder="ระบุรหัสลับ... (Hint : A 8/3/2...)" class="input input-sm redeem-input w-full shadow-inner" />
                    <button onclick="checkRedeem()" class="btn btn-sm btn-redeem px-4 shadow-md">ตกลง</button>
                </div>
                <p id="redeem-error" class="text-[10px] text-red-500 text-center hidden">รหัสไม่ถูกต้องนะ ลองใหม่อีกครั้ง 💖</p>
            </div>
        </div>

        <div onclick="window.location.href='gallery.html'" class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.8s;">
            <div class="glass-panel p-4 text-center cursor-pointer hover:bg-white/40 active:scale-95 transition-all">
                <span class="text-2xl">📸</span>
                <p class="text-xs font-bold mt-1 text-gray-700">Gallery</p>
            </div>
            <div onclick="window.location.href='game.html'" class="glass-panel p-4 text-center cursor-pointer hover:bg-white/40 active:scale-95 transition-all">
                <span class="text-2xl">🧩</span>
                <p class="text-xs font-bold mt-1 text-gray-700">Puzzle</p>
            </div>
        </div>

    </div>

    <script>
        // ระบบ Redeem
        function checkRedeem() {
            const codeInput = document.getElementById('secretCode').value;
            const errorMsg = document.getElementById('redeem-error');
            const targetCode = "A 8/3/2569"; // รหัสลับที่คุณกำหนด

            if (codeInput === targetCode) {
                // เอฟเฟกต์เมื่อรหัสถูก
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => {
                    window.location.href = "surprise.html"; // ไปหน้าลับ
                }, 1500);
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 2000);
            }
        }

        // ระบบนับวัน (เริ่ม 1 มี.ค. 2569 ตามตัวอย่าง)
        const startDate = new Date('2026-03-01T00:00:00'); 
        function updateCounter() {
            const diff = new Date() - startDate;
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('mins').innerText = Math.floor((diff / 60000) % 60);
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
