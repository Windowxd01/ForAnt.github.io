<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - iPhone Glass Style</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .video-background video {
            width: 100vw; height: 100vh; object-fit: cover;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* การ์ดแก้ว iPhone */
        .iphone-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            transition: all 0.8s ease-in-out;
            
            /* ตั้งค่าเริ่มต้นสำหรับ Fade In */
            opacity: 0;
            transform: translateY(20px);
        }

        /* --- แอนิเมชันตอนเปิดเว็บ (Fade In) --- */
        .fade-in {
            animation: fadeInUp 1.2s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.6) !important;
            border: none !important;
            border-radius: 15px;
        }

        .btn-ios {
            background: #ff7597;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* คลาสสำหรับทำให้หายไปตอน Login ผ่าน */
        .exit-animation {
            opacity: 0 !important;
            transform: scale(0.9) translateY(-20px) !important;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="Video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div id="login-card" class="card w-full max-w-sm iphone-glass z-10 overflow-hidden fade-in">
        <div class="card-body p-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-semibold text-gray-800">เข้าสู่ระบบ</h2>
                <p class="text-sm text-gray-600 mt-1">ยินดีต้อนรับกลับมาครับ</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input glass-input w-full" />
                <input type="password" id="password" placeholder="Password" class="input glass-input w-full" />
            </div>

            <p id="error-msg" class="text-pink-600 text-xs mt-4 text-center hidden">
                ไม่มีข้อมูลในระบบนะ ลองตรวจสอบอีกครั้ง
            </p>

            <div class="mt-10">
                <button onclick="handleLogin()" class="btn btn-ios w-full text-lg">
                    เข้าสู่ระบบ
                </button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDisplay = document.getElementById('error-msg');
            const card = document.getElementById('login-card');

            const adminUser = "user";
            const adminPass = "832569";

            if (user === adminUser && pass === adminPass) {
                card.classList.add('exit-animation');
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000);
            } else {
                errorDisplay.classList.remove('hidden');
                card.style.animation = "shake 0.4s ease-in-out";
                setTimeout(() => card.style.animation = "", 400);
            }
        }
    </script>
</body>
</html>
