<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Style Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background: #ffffff; 
            color: #262626;
            overflow-y: auto;
            min-height: 100vh;
        }

        .top-nav { position: sticky; top: 0; z-index: 50; background: white; border-bottom: 1px solid #dbdbdb; }
        .profile-container { max-width: 935px; margin: 0 auto; padding: 15px 15px 30px; }
        @media (min-width: 768px) { .profile-container { padding: 30px 20px; } }
        
        .ig-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        @media (min-width: 768px) { .ig-grid { gap: 28px; } }

        .ig-item { aspect-ratio: 1 / 1; position: relative; cursor: pointer; overflow: hidden; background: #efefef; }
        .ig-item img, .ig-item video { width: 100%; height: 100%; object-fit: cover; }
        
        /* สไตล์หลักของ Modal โพสต์ปกติ */
        .ig-modal-content { 
            background: white; 
            display: flex; 
            flex-direction: row; 
            max-width: 900px; 
            width: 95%; 
            height: 600px; 
            border-radius: 4px; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        /* สไตล์สำหรับโหมด Reels */
        .modal-reels {
            max-width: 400px !important;
            height: 85vh !important;
            border-radius: 16px !important;
        }

        /* การแสดงผลบนมือถือ */
        @media (max-width: 768px) {
            .ig-modal-content:not(.modal-reels) { 
                flex-direction: column; 
                height: auto; 
                max-height: 90vh; 
                overflow-y: auto; 
            }
            .ig-modal-content:not(.modal-reels) .side-info { width: 100% !important; border-left: none !important; }
            .ig-modal-content:not(.modal-reels) .img-container { width: 100% !important; height: 350px !important; flex-shrink: 0; }
            
            /* Reels บนมือถือให้เต็มจอ */
            .modal-reels {
                max-width: 100% !important;
                width: 100% !important;
                height: 100dvh !important; /* ใช้ 100dvh เพื่อไม่ให้แถบ URL บัง */
                border-radius: 0px !important;
                max-height: none !important;
            }
        }

        .active-tab { border-top: 1.5px solid black; color: black !important; margin-top: -1px; }
        .comment-section::-webkit-scrollbar { width: 0px; }
        
        body.modal-open { overflow: hidden; }

        .fullscreen-icon {
            font-size: 1.6rem;
            line-height: 1;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <nav class="top-nav p-3 flex items-center justify-between px-4 md:px-10">

                    </div>
                </div>
            </div>

            <section class="flex flex-col gap-2 md:gap-3 w-full">

                    <div class="flex gap-2 w-full md:w-auto">
                        <button id="follow-btn" class="btn btn-sm w-full md:w-auto btn-ghost border-[#dbdbdb] lowercase font-semibold px-6 bg-[#efefef]">ติดตามแล้ว</button>

                </div>
                <div class="flex justify-between md:justify-start md:gap-8 text-sm py-2 border-y md:border-none border-[#dbdbdb] md:py-0 mt-2 md:mt-0">

        <div class="border-t border-[#dbdbdb] flex justify-center gap-10 md:gap-14 text-[10px] md:text-xs tracking-widest uppercase font-semibold text-[#8e8e8e]">

        <div id="main-grid" class="ig-grid mt-1 md:mt-2"></div>

    <div id="igModal" class="modal invisible opacity-0 transition-all duration-300 fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md md:p-2">
        <button onclick="closePost()" class="absolute top-4 right-4 md:top-5 md:right-5 text-white text-4xl z-[110] drop-shadow-md">&times;</button>
        
        <div class="ig-modal-content scale-95 transition-transform duration-300" id="modalFrame">
            
            <div id="img-container-panel" class="img-container w-full md:w-[550px] bg-black relative group flex items-center justify-center overflow-hidden">
                <div id="postCarousel" class="carousel w-full h-full"></div>
                
                <div id="reels-overlay" class="absolute inset-0 pointer-events-none flex-col justify-end hidden z-10 text-white">
                    <div class="absolute right-3 bottom-10 md:bottom-8 flex flex-col gap-5 md:gap-6 items-center pointer-events-auto drop-shadow-lg">
                        <div class="flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform"><span class="text-3xl">🤍</span><span class="text-xs font-semibold">1.2K</span></div>
                        <div class="flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform"><span class="text-3xl">💬</span><span class="text-xs font-semibold">24</span></div>
                        <div class="flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform"><span class="text-3xl">✈️</span></div>
                        
                        <div class="flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform" onclick="toggleFullscreen(event)" title="แสดงเต็มหน้าจอ (Fullscreen)"><span class="fullscreen-icon drop-shadow-md">⛶</span></div>
                        
                        <div class="flex flex-col items-center gap-1 cursor-pointer hover:scale-110 transition-transform"><span class="text-2xl mt-1">⋮</span></div>
                    </div>
                    
                    <div class="w-full bg-gradient-to-t from-black/80 via-black/40 to-transparent p-4 pb-6 md:pb-4 pr-16 pointer-events-auto">
                        <div class="flex items-center gap-3 mb-2 md:mb-3">
                            <div class="avatar w-8 h-8 md:w-9 md:h-9 rounded-full overflow-hidden border border-white/50 cursor-pointer">
                                <img id="reel-user-img" src="" class="object-cover w-full h-full" onerror="this.src='https://via.placeholder.com/150'" />
                            </div>
                            <span id="reel-username" class="font-bold text-sm md:text-base drop-shadow-md cursor-pointer hover:underline"></span>
                            <button class="btn btn-xs bg-transparent border border-white text-white rounded-lg px-3 hover:bg-white hover:text-black">ติดตาม</button>
                        </div>
                        <p id="reel-caption" class="text-sm drop-shadow-md line-clamp-2 mb-1"></p>
                    </div>
                </div>

                <div id="carousel-nav" class="absolute inset-0 flex items-center justify-between p-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="moveCarousel(-1)" class="btn btn-circle btn-sm bg-white/30 border-none text-white pointer-events-auto backdrop-blur-sm">❮</button>
                    <button onclick="moveCarousel(1)" class="btn btn-circle btn-sm bg-white/30 border-none text-white pointer-events-auto backdrop-blur-sm">❯</button>
                </div>
                <div id="carousel-dots" class="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5"></div>
            </div>

            <div id="side-info-panel" class="side-info w-full md:w-[350px] flex flex-col bg-white">
                <div class="p-4 flex items-center gap-3 border-b">
                    <div class="avatar w-8 h-8 rounded-full overflow-hidden border"><img id="modal-user-img" src="" class="object-cover w-full h-full" onerror="this.src='https://via.placeholder.com/150'" /></div>
                    <span id="modal-username" class="font-bold text-sm"></span>
                </div>
                <div class="p-4 flex-grow overflow-y-auto comment-section">
                    <div id="postCaption" class="text-sm mb-4"></div>
                    <div id="fixedComments" class="space-y-3"></div>
                </div>
                <div class="p-4 border-t bg-white">
                    <div class="flex gap-4 text-xl mb-2"><span>❤️</span><span>💬</span><span>✈️</span></div>
                    <p id="postDate" class="text-[10px] text-gray-400 uppercase tracking-tighter"></p>
                </div>
            </div>

        </div>
    </div>

    <script>

                img: 'Picture/Gallery/prof.jpg',

                    },

                        id: 102, 
                        video: 'Video/f2.MOV', 
                        cap: 'ส้มตำอร่อยไหมจ๊ะ', 
                        date: '18 พ.ค. 2026', 
                        //comments: [{user: '_nokpirap_', text: 'เท่สุดๆ ไปเลย', avatar: 'Picture/Gallery/proa.jpg'}] 
                    }
                ]
            },
            '_nokpirap_': {
                name: '🕊',
                bio: `⁻²⁰⁰⁵⁻ \nMJU89.Foodtech🧫`,
                img: 'Picture/Gallery/proa.jpg',
                followers: '201',
                posts: [
                   { id: 6, images: ['Picture/Gallery/ProAnt/5-4-1.jpeg', 'Picture/Gallery/ProAnt/5-4-2.jpg', 
                    'Picture/Gallery/ProAnt/5-4-3.jpeg', 'Picture/Gallery/ProAnt/5-4-4.jpeg', 
                    'Picture/Gallery/ProAnt/5-4-5.jpeg', 'Picture/Gallery/ProAnt/5-4-6.jpeg',
                    'Picture/Gallery/ProAnt/5-4-7.jpeg', 'Picture/Gallery/ProAnt/5-4-8.jpeg',
                    'Picture/Gallery/ProAnt/5-4-9.jpeg', 'Picture/Gallery/ProAnt/5-4-10.jpeg',
                    'Picture/Gallery/ProAnt/5-4-11.jpeg'], cap: 'หมอนี่ 💖', date: '5 ม.ย. 2026', 
                      comments: [{user: 'evawinspire', text: 'มาเท่วบ้านฉันสิพี่่่่', avatar: 'Picture/Gallery/prof.jpg'}] }
                ],
                reels: []
            }
        };

        let currentImgIndex = 0, currentMedia = [], currentUser = 'evawinspire';
        let currentTab = 'posts'; 

        function loadProfile(username) {
            const user = database[username];
            if (!user) return;
            
            currentUser = username;
            document.getElementById('nav-username').innerText = username;
            document.getElementById('header-username').innerText = username;
            document.getElementById('prof-img').src = user.img;
            document.getElementById('follower-count').innerText = user.followers;
            document.getElementById('post-count').innerText = user.posts.length;

            document.getElementById('profile-bio').innerHTML = `
                <h1 class="font-semibold">${user.name}</h1>
                <p class="whitespace-pre-line leading-snug text-[13px] md:text-sm mt-1">${user.bio}</p>
            `;
            
            const backBtn = document.getElementById('back-btn');
            backBtn.onclick = username === 'evawinspire' ? () => window.location.href = 'home.html' : () => loadProfile('evawinspire');

            switchTab('posts'); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchTab(tab) {
            currentTab = tab;
            const user = database[currentUser];
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';

            document.getElementById('tab-posts').classList.toggle('active-tab', tab === 'posts');
            document.getElementById('tab-reels').classList.toggle('active-tab', tab === 'reels');

            if (tab === 'posts') {
                user.posts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'ig-item shadow-sm';
                    const icon = post.images.length > 1 ? '<div class="absolute top-2 right-2 text-white drop-shadow-md text-xs">▢</div>' : '';
                    item.innerHTML = `<img src="${post.images[0]}" loading="lazy" onerror="this.src='https://via.placeholder.com/300'" /> ${icon}`;
                    item.onclick = () => openPost(post.images, post.cap, post.date, post.comments, currentUser, 'image');
                    grid.appendChild(item);
                });
            } else if (tab === 'reels') {
                if (user.reels && user.reels.length > 0) {
                    user.reels.forEach(reel => {
                        const item = document.createElement('div');
                        item.className = 'ig-item shadow-sm';
                        // มือถือไม่ค่อยรองรับ hover/mouseover ดังนั้นใส่ไอคอน play ชัดๆ ดีกว่า
                        item.innerHTML = `
                            <video src="${reel.video}" class="w-full h-full object-cover" muted loop playsinline 
                                onmouseover="this.play()" onmouseout="this.pause()">
                            </video>
                            <div class="absolute top-2 right-2 text-white drop-shadow-md text-sm md:text-base font-bold">▶</div>
                        `;
                        item.onclick = () => openPost([reel.video], reel.cap, reel.date, reel.comments, currentUser, 'video');
                        grid.appendChild(item);
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-3 text-center text-gray-400 text-sm py-10">ยังไม่มี Reels</div>';
                }
            }
        }

        function openPost(mediaArray, caption, date, comments, postOwner, mediaType = 'image') {
            currentMedia = mediaArray;
            currentImgIndex = 0;
            const carousel = document.getElementById('postCarousel'), dots = document.getElementById('carousel-dots');
            carousel.innerHTML = ''; dots.innerHTML = '';

            const modalFrame = document.getElementById('modalFrame');
            const sideInfoPanel = document.getElementById('side-info-panel');
            const imgContainerPanel = document.getElementById('img-container-panel');
            const reelsOverlay = document.getElementById('reels-overlay');

            if (mediaType === 'video') {
                // จัดการหน้าต่างสำหรับโหมด Reels
                sideInfoPanel.style.display = 'none';
                modalFrame.classList.add('modal-reels'); // ใช้งาน CSS Class แทน JS
                
                imgContainerPanel.classList.remove('md:w-[550px]');
                imgContainerPanel.classList.add('w-full', 'h-full');
                
                reelsOverlay.classList.remove('hidden');
                reelsOverlay.classList.add('flex');
                
                document.getElementById('reel-username').innerText = postOwner;
                document.getElementById('reel-caption').innerText = caption;
                document.getElementById('reel-user-img').src = database[postOwner].img;
            } else {
                // จัดการหน้าต่างสำหรับโพสต์รูปปกติ
                sideInfoPanel.style.display = 'flex';
                modalFrame.classList.remove('modal-reels'); 
                
                imgContainerPanel.classList.add('md:w-[550px]');
                imgContainerPanel.classList.remove('w-full', 'h-full');
                
                reelsOverlay.classList.remove('flex');
                reelsOverlay.classList.add('hidden');
                
                document.getElementById('modal-username').innerText = postOwner;
                document.getElementById('modal-user-img').src = database[postOwner].img;
                document.getElementById('postCaption').innerHTML = `<span class="font-bold">${postOwner}</span> ${caption}`;
                document.getElementById('postDate').innerText = date;
                
                const commentList = document.getElementById('fixedComments');
                commentList.innerHTML = '';
                comments.forEach(c => {
                    const cDiv = document.createElement('div');
                    cDiv.className = 'flex gap-3 text-xs md:text-[13px] items-start';
                    cDiv.innerHTML = `
                        <div class="avatar w-6 h-6 md:w-7 md:h-7 rounded-full overflow-hidden border flex-shrink-0 cursor-pointer" onclick="loadProfile('${c.user}'); closePost();">
                            <img src="${c.avatar}" class="object-cover" onerror="this.src='https://via.placeholder.com/50'" />
                        </div>
                        <div>
                            <span class="font-bold cursor-pointer hover:underline" onclick="loadProfile('${c.user}'); closePost();">${c.user}</span> ${c.text}
                        </div>
                    `;
                    commentList.appendChild(cDiv);
                });
            }

            mediaArray.forEach((src, i) => {
                const div = document.createElement('div');
                div.className = `carousel-item w-full h-full flex items-center justify-center bg-black ${i===0?'block':'hidden'}`;
                div.id = `slide-${i}`;
                
                if (mediaType === 'video') {
                    // วิดีโอโหมด Reels (object-cover ให้เต็มจอ)
                    div.innerHTML = `<video src="${src}" class="w-full h-full object-cover cursor-pointer" autoplay loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>`;
                } else {
                    // รูปภาพโหมดปกติ (object-contain ให้เห็นครบรูป)
                    div.innerHTML = `<img src="${src}" class="max-w-full max-h-full object-contain" onerror="this.src='https://via.placeholder.com/600'" />`;
                }
                
                carousel.appendChild(div);
                
                if(mediaArray.length > 1) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${i===0?'bg-blue-500':'bg-white/50'}`;
                    dot.id = `dot-${i}`; dots.appendChild(dot);
                }
            });

            document.getElementById('carousel-nav').style.display = mediaArray.length > 1 ? 'flex' : 'none';

            const modal = document.getElementById('igModal');
            modal.classList.remove('invisible', 'opacity-0');
            modal.classList.add('modal-open');
            document.body.classList.add('modal-open');
            document.getElementById('modalFrame').classList.add('scale-100');
        }

        function moveCarousel(step) {
            document.getElementById(`slide-${currentImgIndex}`).classList.replace('block', 'hidden');
            const oldVideo = document.getElementById(`slide-${currentImgIndex}`).querySelector('video');
            if (oldVideo) oldVideo.pause();

            if(currentMedia.length > 1) document.getElementById(`dot-${currentImgIndex}`).classList.replace('bg-blue-500', 'bg-white/50');
            currentImgIndex = (currentImgIndex + step + currentMedia.length) % currentMedia.length;
            document.getElementById(`slide-${currentImgIndex}`).classList.replace('hidden', 'block');
            
            const newVideo = document.getElementById(`slide-${currentImgIndex}`).querySelector('video');
            if (newVideo) newVideo.play();

            if(currentMedia.length > 1) document.getElementById(`dot-${currentImgIndex}`).classList.replace('bg-white/50', 'bg-blue-500');
        }

        // ฟังก์ชันขยายวิดีโอเต็มจอ 
        async function toggleFullscreen(event) {
            event.stopPropagation();
            const activeSlide = document.getElementById(`slide-${currentImgIndex}`);
            if (!activeSlide) return;
            
            const mediaElement = activeSlide.querySelector('video') || activeSlide.querySelector('img');
            if (!mediaElement) return;

            try {
                if (!document.fullscreenElement) {
                    if (mediaElement.requestFullscreen) {
                        await mediaElement.requestFullscreen();
                    } else if (mediaElement.webkitRequestFullscreen) { /* Safari */
                        await mediaElement.webkitRequestFullscreen();
                    } else if (mediaElement.msRequestFullscreen) { /* IE11 */
                        await mediaElement.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    }
                }
            } catch (error) {
                console.error('Fullscreen error:', error);
            }
        }

        function closePost() {
            const carousel = document.getElementById('postCarousel');
            const videos = carousel.getElementsByTagName('video');
            for(let video of videos) {
                video.pause();
                video.currentTime = 0;
            }

            if (document.fullscreenElement) {
                document.exitFullscreen().catch(console.error);
            }

            const modal = document.getElementById('igModal');
            modal.classList.add('invisible', 'opacity-0');
            modal.classList.remove('modal-open');
            document.body.classList.remove('modal-open');
            document.getElementById('modalFrame').classList.remove('scale-100');
        }

        loadProfile('evawinspire');
    </script>
</body>
