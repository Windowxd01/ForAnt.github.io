<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Game - iPhone Style</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; overflow: hidden; margin: 0; }
        
        /* วิดีโอพื้นหลัง */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background video { width: 100vw; height: 100vh; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 0; }

        .fade-page-in { animation: fadeInPage 1.5s ease-out forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .iphone-glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        #puzzle-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 310px; height: 310px; margin: 0 auto; }
        .tile { width: 100px; height: 100px; cursor: pointer; border-radius: 12px; background-size: 300px 300px; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.2); }
        .empty { background: rgba(255,255,255,0.1) !important; border: 1px dashed rgba(255,255,255,0.3) !important; }

        .ios-dialog {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; width: 320px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(30px) saturate(180%);
            border-radius: 35px; padding: 2.5rem 1.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* ปุ่มรักแบบทะลุขอบ */
        .btn-ios-blue { 
            background: #007AFF; color: white; border-radius: 15px; border: none; font-weight: 600; 
            padding: 0.8rem 2rem; width: 100%; 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative; z-index: 9999;
        }
        .btn-ios-red { background: #FF3B30; color: white; border-radius: 15px; font-weight: 600; padding: 0.8rem 2rem; width: 100%; border: none; position: relative; z-index: 10; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="Video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div id="main-content" class="iphone-glass-container z-10 text-center fade-page-in">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-white mb-1">With U Ant</h2>
            <p class="text-white/80 text-sm">ช่วยต่อจิ๊กซอว์รูปเราให้ครบหน่อยนะ...</p>
        </div>
        <div id="puzzle-board"></div>
        <div class="mt-6 flex flex-col gap-3">
            <button onclick="shuffleTiles()" class="text-white/60 text-sm hover:text-white underline">สลับตำแหน่งใหม่</button>
            <button onclick="showLoveQuestion()" class="text-white/40 text-xs hover:text-white/80 transition-all">ไม่อยากเล่นแล้ว...</button>
        </div>
    </div>

    <div id="win-card" class="ios-dialog">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">เก่งมากกก</h2>
        <p id="win-text" class="text-gray-600 mb-8 font-medium">คุณทำได้แล้ว A 8/3/2569</p>
        <button onclick="window.location.href='home.html'" class="btn-ios-blue shadow-lg">Redeem Your Reward</button>
    </div>

    <div id="love-modal" class="ios-dialog">
        <h2 id="love-title" class="text-2xl font-bold text-gray-800 mb-6">ข้ามก็ได้... แต่รักเค้าไหม?</h2>
        <div class="flex flex-col gap-4">
            <button id="yes-btn" onclick="answerLove(true)" class="btn-ios-blue">รักที่สุด!</button>
            <button id="no-btn" onclick="answerLove(false)" class="btn-ios-red transition-all duration-200">ไม่รัก</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('puzzle-board');
        const winCard = document.getElementById('win-card');
        const loveModal = document.getElementById('love-modal');
        const mainContent = document.getElementById('main-content');
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        
        const imgUrl = 'Picture/Gallery/14-4-2.jpeg'; 
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        let noCount = 0;
        let yesScale = 1;

        function createBoard() {
            board.innerHTML = '';
            tiles.forEach((tileIndex, i) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                if (tileIndex === 8) {
                    tile.classList.add('empty');
                } else {
                    tile.style.backgroundImage = `url(${imgUrl})`;
                    const row = Math.floor(tileIndex / 3);
                    const col = tileIndex % 3;
                    tile.style.backgroundPosition = `-${col * 100}px -${row * 100}px`;
                    tile.onclick = () => moveTile(i);
                }
                board.appendChild(tile);
            });
            checkWin();
        }

        function getNeighbors(index) {
            const neighbors = [];
            const row = Math.floor(index / 3);
            const col = index % 3;
            if (row > 0) neighbors.push(index - 3);
            if (row < 2) neighbors.push(index + 3);
            if (col > 0) neighbors.push(index - 1);
            if (col < 2) neighbors.push(index + 1);
            return neighbors;
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(8);
            if (getNeighbors(index).includes(emptyIndex)) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                createBoard();
            }
        }

        function shuffleTiles() {
            tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8];
            for(let i=0; i<15; i++) {
                const emptyIndex = tiles.indexOf(8);
                const neighbors = getNeighbors(emptyIndex);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyIndex], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyIndex]];
            }
            winCard.style.display = 'none';
            loveModal.style.display = 'none';
            mainContent.style.filter = "none";
            createBoard();
        }

        function checkWin() {
            const isWin = tiles.every((tile, index) => tile === index);
            if (isWin && tiles[8] === 8) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                setTimeout(() => {
                    winCard.style.display = 'block';
                    mainContent.style.filter = "blur(10px)";
                }, 500);
            }
        }

        function showLoveQuestion() {
            mainContent.style.filter = "blur(10px)";
            loveModal.style.display = 'block';
        }

        function answerLove(isLove) {
            if (isLove) {
                confetti({ particleCount: 200, spread: 100 });
                loveModal.style.display = 'none';
                document.getElementById('win-text').innerText = "ขอบคุณที่รักกันนะ! นี่คือรหัสของคุณ: A 8/3/2569";
                winCard.style.display = 'block';
                mainContent.style.filter = "blur(10px)";
            } else {
                noCount++;
                yesScale += 0.8; // ขยายใหญ่ขึ้นครั้งละเกือบเท่าตัว
                
                // ใช้ scale เพื่อขยายให้ทะลุ Modal
                yesBtn.style.transform = `scale(${yesScale})`;

                // ถ้ากดไม่รักเกิน 5 ครั้ง ให้ปุ่มไม่รักเริ่มจางหายไป
                if(noCount > 5) {
                    noBtn.style.opacity = (1 - (noCount-5)*0.2).toString();
                }
                if(noCount > 10) {
                    noBtn.style.display = "none";
                }
            }
        }

        shuffleTiles();
    </script>
</body>
</html>
