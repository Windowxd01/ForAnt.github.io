<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surprise for You 💖</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; overflow: hidden; background: #fff5f7; }

        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 0; }

        .fade-page { animation: fadeIn 1.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 2.2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        /* โซนขูดหวย */
        .scratch-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 15px;
            border-radius: 25px;
            overflow: hidden;
            border: 4px solid white;
        }

        #scratch-canvas {
            position: absolute;
            top: 0; left: 0;
            cursor: pointer;
            touch-action: none;
        }

        .secret-img { width: 100%; height: 100%; object-fit: cover; }

        #surprise-content {
            display: none;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .floating-heart {
            position: absolute;
            font-size: 1.8rem;
            animation: float 4s ease-in infinite;
            opacity: 0;
            z-index: 5;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-500px) scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 fade-page">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="Video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="glass-card z-10 max-w-sm w-full relative overflow-hidden">
        
        <div id="scratch-instruction">
            <h1 class="text-2xl font-bold mb-1">Lucky Scratch 🎰</h1>
            <p class="text-white/80 text-[11px] mb-5 font-light">ขูดหาความในใจที่เค้าซ่อนไว้ให้หน่อย...</p>
        </div>

        <div class="scratch-container" id="scratch-area">
            <img src="Picture/Gallery/prof.jpg" class="secret-img">
            <canvas id="scratch-canvas" width="260" height="260"></canvas>
        </div>

        <div id="surprise-content">
            <div class="mb-5">
                <span class="text-4xl">🎁</span>
                <h1 class="text-2xl font-bold mt-3">You Found It!</h1>
                <p class="text-white/80 text-[11px] mt-1">ของขวัญชิ้นพิเศษสำหรับคนพิเศษ</p>
            </div>

            <div class="bg-white/20 p-5 rounded-3xl mb-6 border border-white/30">
                <p class="text-md leading-relaxed italic">
                    "ขอบคุณนะที่เป็นความสุขให้กันนะ <br> 
                    รหัสลับนี้อาจจะหาง่าย <br>
                    แต่เธอลองเปลี่ยนคำว่า A เป็น NT แล้วเปลี่ยนเลขด้านหลังเป็น 17/3/2569 ดูสิ <br>"
                </p>
                <p class="mt-3 font-bold text-pink-300 text-sm">- Evawinspire -</p>
            </div>

            <button onclick="triggerSurprise()" class="btn btn-md w-full rounded-full bg-white text-pink-500 border-none hover:bg-pink-100 font-bold shadow-md">
                กดเพื่อรับทราบ 💖
            </button>
            
            <button onclick="window.location.href='home.html'" class="btn btn-sm btn-ghost text-white/60 mt-4 hover:text-white font-light">
                กลับหน้าหลัก
            </button>
        </div>

        <div id="back-nav" class="mt-4">
            <button onclick="window.location.href='home.html'" class="text-white/40 text-[11px] hover:text-white underline font-light">
                ยกเลิกและกลับหน้าหลัก
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        function initScratch() {
            ctx.fillStyle = '#C0C0C0'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#A8A8A8';
            for(let i=0; i<300; i++) {
                ctx.fillRect(Math.random()*260, Math.random()*260, 2, 2);
            }
            ctx.globalCompositeOperation = 'destination-out';
        }

        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.beginPath();
            ctx.arc(x, y, 22, 0, Math.PI * 2);
            ctx.fill();
            checkScratchProgress();
        }

        function checkScratchProgress() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clearedPixels = 0;
            for (let i = 3; i < imageData.length; i += 4) {
                if (imageData[i] === 0) clearedPixels++;
            }

            if (clearedPixels > (imageData.length / 4) * 0.55) {
                canvas.style.transition = 'opacity 0.8s';
                canvas.style.opacity = '0';
                setTimeout(() => {
                    canvas.remove();
                    document.getElementById('scratch-instruction').style.display = 'none';
                    document.getElementById('back-nav').style.display = 'none';
                    revealSurprise();
                }, 400);
            }
        }

        function revealSurprise() {
            const content = document.getElementById('surprise-content');
            content.style.display = 'block';
            // พลุนิดหน่อยพอสวยงาม
            confetti({
                particleCount: 60,
                spread: 50,
                origin: { y: 0.7 }
            });
        }

        function triggerSurprise() {
            // พลุลดลงตามคำขอ
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.7 },
                colors: ['#ff85a2', '#ffffff', '#ff4d7d']
            });

            for(let i=0; i<8; i++) {
                setTimeout(createHeart, i * 250);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            heart.style.left = (15 + Math.random() * 70) + 'vw';
            heart.style.top = '100vh';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => scratch(e));

        initScratch();
    </script>
</body>
</html>
