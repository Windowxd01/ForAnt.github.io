<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for You 💖</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; overflow: hidden; background: #fff5f7; }

        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 0; }

        /* แอนิเมชันตอนเปิดหน้า */
        .fade-page { animation: fadeIn 2s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* กล่องแก้ว iPhone */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        /* เอฟเฟกต์หัวใจลอย */
        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: float 4s ease-in infinite;
            opacity: 0;
            z-index: 5;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-500px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 fade-page">

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="Video/bg.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="glass-card z-10 max-w-sm w-full relative overflow-hidden">
        <div class="mb-6">
            <span class="text-5xl">🎁</span>
            <h1 class="text-3xl font-bold mt-4">You Found It!</h1>
            <p class="text-white/80 text-sm mt-2">ของขวัญชิ้นพิเศษสำหรับคนพิเศษ</p>
        </div>

        <div class="bg-white/20 p-6 rounded-3xl mb-8 border border-white/30">
            <p class="text-lg leading-relaxed italic">
                "ขอบคุณนะที่เป็นความสุขให้กัน <br> 
                รหัสลับนี้อาจจะหาง่าย <br>
                แต่ความรักที่เค้ามีให้ <br>
                หาจากที่ไหนไม่ได้อีกแล้วนะ"
            </p>
            <p class="mt-4 font-bold text-pink-300">- PP ❤️ Put -</p>
        </div>

        <button onclick="triggerSurprise()" class="btn btn-wide rounded-full bg-white text-pink-500 border-none hover:bg-pink-100 font-bold text-lg shadow-lg">
            กดเพื่อรับรัก 💖
        </button>

        <div class="mt-6">
            <button onclick="window.location.href='home.html'" class="text-white/50 text-xs hover:text-white underline">กลับหน้าหลัก</button>
        </div>
    </div>

    <script>
        // ฟังก์ชันยิงพลุและหัวใจ
        function triggerSurprise() {
            // ยิงพลุ
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff85a2', '#ffffff', '#ff4d7d', '#ff0000']
            });

            // สร้างหัวใจลอยขึ้นมา
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 200);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'floating-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        // ยิงพลุอัตโนมัติเมื่อเข้าหน้าครั้งแรก
        window.onload = () => {
            confetti({
                particleCount: 100,
                startVelocity: 30,
                spread: 360,
                origin: { x: Math.random(), y: Math.random() - 0.2 }
            });
        };
    </script>
</body>
</html>
